kind: HorizontalPodAutoscaler
apiVersion: autoscaling/v2

metadata:
  name: my-hpa
  namespace: my-ns

spec:
  scaleTargetRef:
    name: my-dep
    kind: Deployment
    apiVersion: apps/v1

  minReplicas: 1
  maxReplicas: 2

  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50
