apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: helm-ing
  namespace: helm-ns
#  annotations:
#    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: {{ .Values.ingress.className}}
  rules:
  - http:
      paths:
      - path: /test
        pathType: Prefix
        backend:
          service:
            name: helm-svc
            port:
              number: 80
